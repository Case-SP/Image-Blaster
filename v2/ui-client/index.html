<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Image Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <!-- Sign in -->
    <section id="email-section" class="view">
      <p class="welcome" id="welcome-msg" hidden></p>
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      <button type="button" id="email-btn" class="btn-primary">Send code</button>
      <p class="hint" id="email-msg"></p>
      <button type="button" id="have-code-btn" class="btn-link">I have an access code</button>
    </section>

    <!-- Redeem access code (out-of-band grant) -->
    <section id="access-section" class="view" hidden>
      <label for="access-code">Access code</label>
      <input type="text" id="access-code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000" autocomplete="one-time-code">
      <button type="button" id="access-btn" class="btn-primary">Sign in</button>
      <p class="hint" id="access-msg"></p>
      <button type="button" id="back-to-email-btn" class="btn-link">Use email instead</button>
    </section>

    <!-- Verify code -->
    <section id="code-section" class="view" hidden>
      <label for="code">Code sent to <span id="code-email"></span></label>
      <input type="text" id="code" inputmode="numeric" pattern="[0-9]{4,10}" maxlength="10" placeholder="000000" autocomplete="one-time-code" required>
      <button type="button" id="code-btn" class="btn-primary">Verify</button>
      <button type="button" id="resend-btn" class="btn-link">Resend</button>
      <p class="hint" id="code-msg"></p>
    </section>

    <!-- App -->
    <section id="app-section" hidden>
      <textarea id="titles" rows="8" placeholder="Paste titles, one per line…"></textarea>

      <div class="controls">
        <button type="button" id="n-btn" class="btn-n" title="Images per title">3</button>
        <button type="button" id="model-btn" class="btn-n" title="Render model (click to cycle)" data-model="fal-ai/nano-banana-pro">nano</button>
        <button type="button" id="generate-btn" class="btn-primary btn-compact">Generate</button>
      </div>

      <p class="totals" id="totals"></p>

      <!-- Latest run, always visible when present -->
      <div id="latest-run" class="run-latest" hidden></div>

      <!-- Older runs, collapsed by default -->
      <details id="older-runs" hidden>
        <summary>Older<span id="older-count"></span></summary>
        <div id="older-list" class="run-list"></div>
      </details>

      <button type="button" id="signout-btn" class="btn-link signout">Sign out</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>

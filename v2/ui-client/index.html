<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Image Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Image Generator</h1>
    <div id="status-pill" class="idle" hidden>
      <span class="dot"></span>
      <span id="status-text">idle</span>
    </div>
  </header>

  <main>
    <section id="email-section" class="card">
      <h2>Sign in</h2>
      <p class="muted">Enter your email. We'll send you a 6-digit code.</p>
      <form id="email-form">
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
        <button type="submit" id="email-btn">Send code</button>
      </form>
      <p class="hint" id="email-msg"></p>
    </section>

    <section id="code-section" class="card" hidden>
      <h2>Enter code</h2>
      <p class="muted">Check <span id="code-email"></span> for the code.</p>
      <form id="code-form">
        <input type="text" id="code" inputmode="numeric" pattern="[0-9]{4,10}" maxlength="10" placeholder="Enter code from email" autocomplete="one-time-code" required>
        <button type="submit" id="code-btn">Verify</button>
      </form>
      <p class="hint" id="code-msg"></p>
      <button type="button" id="resend-btn" class="linklike">Resend code</button>
    </section>

    <section id="app-section" hidden>
      <section class="card" id="generate-card">
        <form id="batch-form">
          <label>Titles <span class="muted">(one per line)</span>
            <textarea id="titles" rows="10" placeholder="Does Creatine Cause Hair Loss?&#10;How to Quit Smoking&#10;Can Coffee Cause Acne?"></textarea>
          </label>
          <div class="controls-row">
            <label class="inline-label">Images per title
              <select id="n-per-title">
                <option value="1">1</option>
                <option value="3" selected>3</option>
                <option value="5">5</option>
                <option value="10">10</option>
              </select>
            </label>
            <div class="totals" id="totals">0 titles · 0 images total</div>
          </div>
          <div class="row">
            <button type="submit" id="generate-btn">Generate</button>
            <button type="button" id="signout-btn" class="secondary">Sign out</button>
          </div>
        </form>
      </section>

      <section class="card" id="downloads-card">
        <h2>Downloads</h2>
        <table id="runs-table">
          <thead><tr><th>Started</th><th>Titles</th><th>Progress</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
        <p class="empty" id="no-runs" hidden>No runs yet — generate your first batch above.</p>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
